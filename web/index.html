<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>월간 재첩</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gugi&family=Noto+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-nav" id="site-nav">
    <div class="site-nav-inner">
      <button class="nav-link active" id="nav-stats" type="button" data-view-tab="stats">통계</button>
      <button class="nav-link" id="nav-game" type="button" data-view-tab="game">게임</button>
    </div>
  </header>

  <main>
    <section class="hero" id="top">
      <video class="hero-video" id="hero-video" autoplay muted playsinline preload="metadata"></video>
      <div class="hero-scrim"></div>
      <div class="hero-content">
        <h1>월간 재첩</h1>
        <p class="hero-issue hidden" id="hero-issue"></p>
        <button class="hero-link" id="open-report-picker" type="button">확인하기</button>
      </div>
    </section>

    <section class="content-shell" id="content">
      <section class="report-picker hidden" id="report-picker">
        <div class="report-picker-head">
          <p class="eyebrow">월간 로그</p>
          <h2>월간 로그 선택</h2>
        </div>
        <div class="archive-strip" id="archive-list"></div>
      </section>

      <div class="status-stack">
        <div class="loading-panel" id="loading-panel">리포트를 준비하는 중입니다...</div>
        <div class="error-panel hidden" id="error-panel"></div>
      </div>

      <div class="report-root hidden" id="report-root"></div>
      <div class="game-root hidden" id="game-root"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
